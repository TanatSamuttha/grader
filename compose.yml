services:

  web-server:
    build: ./services/web
    ports:
      - "80:80"

  auth-server:
    build: ./services/auth
    env_file:
      - ./services/auth/.env
    ports:
      - "3000:3000"

  problem-server:
    build: ./services/problem
    env_file:
      - ./services/problem/.env
    ports:
      - "3001:3001"

  storage-server:
    build: ./services/storage
    env_file:
      - ./services/storage/.env
    ports:
      - "3002:3002"
    volumes:
      - "./services/storage/safe:/safe"