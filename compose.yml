services:

  web-server:
    build: ./services/web
    ports:
      - "80:80"

  auth-server:
    build: ./services/auth
    env_file:
      - ./services/auth/.env
    ports:
      - "3000:3000"

  problems-server:
    build: ./services/problems
    env_file:
      - ./services/problems/.env
    ports:
      - "3001:3001"